<!DOCTYPE html>
<html>
    <head>
    <meta charset="utf-8">
    <title>Cursinho Web - Contato</title>
    <link rel="icon" href="tags.png">
    <link rel ="stylesheet" href="styles.css">
    <script src="script.js"defer></script>
   
    </head>
   
   <body>
    <header>
         <nav>
            <a href="index.html">Pagina inicial</a>  
            <a href="disciplinas.html">Disciplinas Oferecidas</a> 
            <a href="contato.html">Contato</a>
         </nav>    
      <h1>Dados para contato:</h1>
    
    </header>
   
    <main>
         <form method="post" action="recebe_dados.html" novalidate>
       
        <div>
            <label for="tx-usuario">Nome Completo:</label><br>
            <input type="text" name="nome" id="tx-usuario" required maxlength="100" placeholder="Digite seu nome completo" size="50">
        </div>
        <div>
            <label for="tx-email">E-mail:</label><br>
             <input type="email" name="email" id="tx-email" required minlength="8" placeholder="Digite seu E-mail" size="50">
        </div>
        <div><br>
             <label for="se-disciplina">Qual disciplina te interessa mais?</label><br>
            <select name="disciplica" id="se-disciplina">
                <option value="DV" selected>Desenvolvimento Web</option>
                <option value="LS">Linguagem SQL</option>
                <option value="ES">Engenharia de Software</option>
                <option value="POO">Programação Orientada a Objetos</option>
            </select>
        </div>
        <div>
            <fieldset>
           <legend> Qualis linguagens você conhece: </legend>
            <input type="checkbox" name="linguagens" id="cb-csharp" value="c"><label for="cb-csharp">C#</label><br>
            <input type="checkbox" name="linguagens" id="cb-java" value="java"><label for="cb-java">Java</label><br>
            <input type="checkbox" name="linguagens" id="cb-javascript" value="javascript"><label for="cb-javascript">JavaScript</label><br>
            <input type="checkbox" name="linguagens" id="cb-python" value="python"><label for="cb-python">Python</label><br>
            <input type="checkbox" name="linguagens" id="cb-php" value="php"><label for="cb-php">PHP</label><br>
            <input type="checkbox" name="linguagens" id="cb-ruby" value="ruby"><label for="cb-ruby">Ruby</label>
            </fieldset>
        </div>
        <div>
            <fieldset>
                <legend>Onde você conheceu o Cursinho Web?</legend>
                <input type="radio" name="conhecer" id="ra-amigos" value="amigos"><label for="ra-amigos" >Amigos</label><br>
                <input type="radio" name="conhecer" id="ra-google" value="google"><label for="ra-google" >Google</label><br>
                <input type="radio" name="conhecer" id="ra-youtube" value="youtube"><label for="ra-youtube" >Youtube</label><br>
                <input type="radio" name="conhecer" id="ra-instagram" value="instagram"><label for="ra-instagram" >Instagram</label>
            </fieldset><br>
        </div>
        <div>
            <button type="reset">Limpar</button>    
            <button type="submit">Enviar</button>
               
        </div>
        </form>
        </main>
  
    <footer>
        Cursinho web - Todos os direitos reservados<br>
        Contato: <a id="link-email"href="mailto:email@provedor.com">email@provedor.com</a>
    </footer>
      </body>
</html>
