<!DOCTYPE html>
<html>
<head>
    <title> Exemplos de Formularios</title>
    <meta charset="utf-8">
</head>   
<body>
    <h1>Exemplos de Formulários</h1>
    <form method="post" action="recebe_dados.html">
        <div>
            <label for="tx-usuario">Usuário:</label>
             <input type="text" name="usuario" id="tx-usuario" required maxlength="40" placeholder="Digite seu nome de Usuário">
        </div>
        <div>
            <label for="tx-senha">Senha:</label>
             <input type="password" name="senha" id="tx-senha" required minlength="8" placeholder="Digite sua senha">
        </div>
         <div>
            <label for="tx-email">E-mail:</label>
             <input type="email" name="email" id="tx-email" required placeholder="Digite seu E-mail">
        </div>
         <div>
            <label for="tx-data">Data:</label>
             <input type="date" name="data" id="tx-data">
        </div>
         <div>
            <label for="tx-datahora">Data e Hora:</label>
             <input type="datetime-local" name="tx-datahora" id="tx-datahora">
        </div>
         <div>
            <label for="tx-numero">Idade:</label>
             <input type="number" name="numero" id="tx-numero">
        </div>
        <div>
            <label for="tx-mensagem">Mensagem:</label><br>
            <textarea name="mensagem" id="tx-mensagem" rows="5" cols="30"></textarea>
        </div>
        <div>
            <label for="se-estado">Selecione seu estado</label>
            <select name="estado" id="se-estado">
                <option value="Al">Alagoas</option>
                <option value="CE">Ceará</option>
                <option value="SP" selected>São Paulo</option>
            </select>
        </div>
        <div>
            <fieldset>
           <legend> Selecione o turno da sua preferência: </legend>
            <input type="checkbox" name="turno" id="cb-manha" value="manha"><label for="cb-manha">Manhã</label>
            <input type="checkbox" name="turno" id="cb-tarde" value="tarde"><label for="cb-tarde">Tarde</label>
            <input type="checkbox" name="turno" id="cb-noite" value="noite"><label for="cb-noite">Noite</label>
            <input type="checkbox" name="turno" id="cb-ead" value="ead" checked><label for="cb-ead">EAD</label>
            </fieldset>
        </div>
        <fieldset>
            <div>
                <legend>Sexo:</legend>
                <input type="radio" name="sexo" id="ra-masculino" value="Masculino:"><label for="ra-masculino">Masculino</label>
                <input type="radio" name="sexo" id="ra-feminino" value="Feminino:" checked><label for="ra-feminino">Feminino</label>
            </div>
        </fieldset>
        <br>
        <div>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
                <button type="button">Clique em mim</button>
            </div>
        
    </form>

</body>
    
</html>
